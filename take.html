{% extends "base.html" %}
{% block title %}{{ quiz.title }}{% endblock %}
{% block content %}
<div class="text-center mb-4">
    <h2 class="fw-bold">{{ quiz.title }}</h2>
    <p class="text-muted">{{ quiz.description }}</p>
</div>

<form method="POST" action="{{ url_for('submit_quiz', quiz_id=quiz.id) }}">
    {% for q in quiz.questions %}
    <div class="card mb-4 shadow-sm">
        <div class="card-header bg-white fw-bold fs-5">
            <span class="badge bg-primary me-2">{{ loop.index }}</span> {{ q.text }}
        </div>
        <div class="card-body">
            {% for ans in q.answers %}
            <div class="form-check mb-2 p-2 hover-bg-light">
                <input class="form-check-input" type="radio" name="q_{{ q.id }}" value="{{ ans.id }}" id="q{{ q.id }}_{{ ans.id }}" required>
                <label class="form-check-label w-100" for="q{{ q.id }}_{{ ans.id }}">
                    {{ ans.text }}
                </label>
            </div>
            {% endfor %}
        </div>
    </div>
    {% endfor %}
    <div class="d-grid gap-2">
        <button type="submit" class="btn btn-primary btn-lg">✅ Завершить и посмотреть результат</button>
    </div>
</form>
{% endblock %}
