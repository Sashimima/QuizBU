<!DOCTYPE html>
<html lang="ru">
<head>
    <!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- 🌓 ТЕМА: Применяем ДО загрузки стилей -->
    <script>
        const savedTheme = localStorage.getItem('quiz-theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
    </script>
    <title>{% block title %}QuizBU{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Онлайн-викторины{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f5f7fa; }
        .quiz-card { transition: transform 0.2s, box-shadow 0ы.2s; }
        .quiz-card:hover { transform: translateY(-4px); box-shadow: 0 8px 16px rgba(0,0,0,0.1); }
        .hero { background: linear-gradient(135deg, #4e73df, #224abe); color: white; padding: 3rem 0; margin-bottom: 2rem; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{{ url_for('index') }}">📝 QuizBU</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="{{ url_for('create_quiz') }}">+ Создать викторину</a>
            </div>
        </div>
    </nav>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            <div class="container mt-3">
                {% for category, message in messages %}
                    <div class="alert alert-{{ category if category != 'message' else 'info' }} alert-dismissible fade show">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                {% endfor %}
            </div>
        {% endif %}
    {% endwith %}

    <div class="container pb-5">
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
        <!-- 🌓 Синхронизация темы -->
    <script>
        // Применяем тему при загрузке
        document.addEventListener('DOMContentLoaded', () => {
            const theme = localStorage.getItem('quiz-theme') || 'light';
            document.documentElement.setAttribute('data-theme', theme);
        });
        
        // Функция переключения (доступна на всех страницах)
        function toggleTheme() {
            const current = localStorage.getItem('quiz-theme') || 'light';
            const next = current === 'dark' ? 'light' : 'dark';
            localStorage.setItem('quiz-theme', next);
            document.documentElement.setAttribute('data-theme', next);
            // Отправляем на сервер для синхронизации сессии
            fetch('/toggle_theme', { method: 'GET' });
        }
    </script>
</body>
</html>
